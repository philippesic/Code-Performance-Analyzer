`<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src https: data:; style-src 'unsafe-inline'; script-src 'nonce-${nonce}' https://cdn.jsdelivr.net; connect-src 'none';">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Analysis Panel</title>
        <style>
            body { padding: 10px; font-family: var(--vscode-font-family); color: var(--vscode-foreground); }
            h1 { color: var(--vscode-editor-foreground); margin: 0 0 8px; font-size: 16px; }
            .section { margin-bottom: 12px; }
            #analysis-result { white-space: pre-wrap; margin-bottom: 12px; }
            .charts-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
            .chart-card { background: var(--vscode-editor-background); border: 1px solid var(--vscode-panel-border); border-radius: 6px; padding: 8px; }
            .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
            select, button { background: var(--vscode-input-background); color: var(--vscode-input-foreground); border: 1px solid var(--vscode-input-border); padding: 4px 6px; border-radius: 4px; }
            details { border: 1px solid var(--vscode-panel-border); border-radius: 6px; padding: 6px; background: var(--vscode-editor-background); }
            summary { cursor: pointer; }
            canvas { width: 100% !important; height: 240px !important; }
            @media (min-width: 900px) {
              .charts-grid { grid-template-columns: 1fr 1fr; }
            }
        </style>
    </head>
    <body>
        <h1>Code Performance Analyzer</h1>
        <div class="section row">
          <div>Function:</div>
          <select id="functionSelect"></select>
          <button id="exportBtn" title="Export analysis as JSON">Export JSON</button>
        </div>
        <p id="analysis-result" class="section">Run an analysis to see results here.</p>
        <div class="charts-grid section">
          <div class="chart-card">
            <div style="margin-bottom:6px;"><strong>Runtime growth vs n</strong></div>
            <canvas id="lineChart"></canvas>
          </div>
        </div>
        <details class="section" open>
          <summary><strong>Function details</strong></summary>
          <div id="functionDetails" style="margin-top:6px;"></div>
        </details>

        <script nonce="${nonce}" src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script nonce="${nonce}">
            const vscode = acquireVsCodeApi();

            // Initialize chart
            const lineCtx = document.getElementById('lineChart').getContext('2d');

            const themeGrid = getComputedStyle(document.documentElement).getPropertyValue('--vscode-widget-border') || 'rgba(128,128,128,0.3)';

            const lineChart = new Chart(lineCtx, {
              type: 'line',
              data: { labels: [], datasets: [] },
              options: {
                responsive: true,
                plugins: { legend: { display: true }, tooltip: { enabled: true } },
                scales: { y: { beginAtZero: true, grid: { color: themeGrid } }, x: { grid: { color: themeGrid } } }
              }
            });

            const functionSelect = document.getElementById('functionSelect');
            const exportBtn = document.getElementById('exportBtn');
            const detailsEl = document.getElementById('functionDetails');
            let lastPayload = null;

            exportBtn.addEventListener('click', () => {
              if (!lastPayload) return;
              const blob = new Blob([JSON.stringify(lastPayload, null, 2)], { type: 'application/json' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = 'cpa-analysis.json';
              a.click();
              URL.revokeObjectURL(url);
            });

            function populateFunctionSelect(functions) {
              functionSelect.innerHTML = '';
              if (!functions || functions.length === 0) {
                const opt = document.createElement('option');
                opt.textContent = 'No functions detected';
                opt.value = '-1';
                functionSelect.appendChild(opt);
                functionSelect.disabled = true;
              } else {
                functionSelect.disabled = false;
                functions.forEach((f, idx) => {
                  const opt = document.createElement('option');
                  opt.textContent = f.name + (f.isRecursive ? ' (recursive)' : '');
                  opt.value = String(idx);
                  functionSelect.appendChild(opt);
                });
              }
            }

            function renderFunctionDetails(functions) {
              if (!functions || functions.length === 0) {
                detailsEl.textContent = 'No functions were detected in the selected code.';
                return;
              }
              detailsEl.innerHTML = '';
              functions.forEach((f) => {
                const div = document.createElement('div');
                div.style.marginBottom = '6px';
                div.innerHTML = '<strong>' + f.name + '</strong>' +
                  ' — complexity: ' + (f.complexity || '?') +
                  ', recursive: ' + (f.isRecursive ? 'yes' : 'no') +
                  ', starts at line: ' + (f.startLine + 1);
                detailsEl.appendChild(div);
              });
            }

            function highlightDataset(datasets, labelToHighlight) {
              return datasets.map(ds => {
                const isHi = ds.label === labelToHighlight;
                return {
                  ...ds,
                  borderWidth: isHi ? 3 : 1.5,
                  borderDash: isHi ? [] : [4,2],
                  pointRadius: isHi ? 2.5 : 0
                };
              });
            }

            window.addEventListener('message', event => {
                const message = event.data;
                switch(message.command) {
                    case 'updateResult':
                        // update text
                        const resultEl = document.getElementById('analysis-result');
                        resultEl.textContent = message.text;

                        // update charts if provided
                        if (message.chartData) {
                          lastPayload = message.chartData;
                          // line chart
                          lineChart.data.labels = message.chartData.line?.labels || [];
                          const ds = message.chartData.line?.datasets || [];
                          lineChart.data.datasets = highlightDataset(ds, message.chartData.line?.highlight);
                          lineChart.update();

                          // functions
                          populateFunctionSelect(message.chartData.functions || []);
                          renderFunctionDetails(message.chartData.functions || []);
                        }
                        break;
                }
            });

            functionSelect.addEventListener('change', () => {
              if (!lastPayload || !lastPayload.line) return;
              const selectedIdx = parseInt(functionSelect.value, 10);
              if (isNaN(selectedIdx) || !lastPayload.functions || !lastPayload.functions[selectedIdx]) {
                lineChart.data.datasets = highlightDataset(lastPayload.line.datasets, lastPayload.line.highlight);
                lineChart.update();
                return;
              }
              const fn = lastPayload.functions[selectedIdx];
              const labelMap = { 'O(1)': 'O(1)', 'O(n)': 'O(n)', 'O(n log n)': 'O(n log n)', 'O(n²)': 'O(n²)', 'O(2^n)': 'O(2^n)' };
              const targetLabel = labelMap[fn.complexity] || lastPayload.line.highlight;
              lineChart.data.datasets = highlightDataset(lastPayload.line.datasets, targetLabel);
              lineChart.update();
            });
        </script>
    </body>
    </html>
